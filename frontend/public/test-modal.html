<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <button onclick="document.getElementById('modal').classList.remove('hidden')" class="px-4 py-2 bg-blue-600 text-white rounded">
        فتح النافذة
    </button>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:max-w-2xl sm:mx-4 sm:rounded-2xl rounded-t-3xl max-h-screen sm:max-h-[90vh] flex flex-col shadow-2xl">
            
            <!-- Header -->
            <div class="flex items-center justify-between px-4 py-3 bg-gradient-to-r from-blue-600 to-blue-700 shrink-0 sm:rounded-t-2xl rounded-t-3xl">
                <h2 class="text-base font-bold text-white">إنشاء دورة مالية</h2>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-10 h-10 rounded-xl bg-white/20 backdrop-blur hover:bg-white/30 flex items-center justify-center transition-all">
                    <span class="text-white text-xl">×</span>
                </button>
            </div>

            <!-- Tabs -->
            <div class="flex gap-1.5 p-2.5 bg-slate-100 shrink-0">
                <button class="flex-1 px-4 py-2.5 rounded-xl font-bold text-xs bg-white text-blue-600 shadow-md">
                    Google Sheets
                </button>
                <button class="flex-1 px-4 py-2.5 rounded-xl font-bold text-xs text-slate-600">
                    رفع ملفات
                </button>
            </div>

            <!-- Body - Scrollable -->
            <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain px-4 py-3 space-y-3">
                
                <!-- Content -->
                <div class="flex items-start gap-2.5 text-xs text-blue-900 bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                    <span class="leading-relaxed">اختر الجداول من حسابك في Google Sheets</span>
                </div>
                
                <!-- Card 1 -->
                <div class="bg-gradient-to-br from-amber-50 to-orange-50 border-2 border-amber-300 rounded-xl p-3.5 shadow-sm">
                    <span class="font-bold text-slate-800 text-xs">الإدارة</span>
                    <div class="grid grid-cols-2 gap-2.5 mt-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">الجدول</label>
                            <select class="w-full px-2.5 py-2 text-xs border-2 border-amber-400 rounded-lg bg-white">
                                <option>اختر الجدول</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">الورقة</label>
                            <select class="w-full px-2.5 py-2 text-xs border-2 border-amber-400 rounded-lg bg-white">
                                <option>أول ورقة</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="bg-gradient-to-br from-blue-50 to-cyan-50 border-2 border-blue-300 rounded-xl p-3.5 shadow-sm">
                    <span class="font-bold text-slate-800 text-xs">الوكيل</span>
                    <div class="grid grid-cols-2 gap-2.5 mt-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">الجدول</label>
                            <select class="w-full px-2.5 py-2 text-xs border-2 border-blue-400 rounded-lg bg-white">
                                <option>اختر الجدول</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">الورقة</label>
                            <select class="w-full px-2.5 py-2 text-xs border-2 border-blue-400 rounded-lg bg-white">
                                <option>أول ورقة</option>
                            </select>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Footer - Fixed Button -->
            <div class="bg-white border-t-4 border-emerald-400 px-4 py-4 shrink-0">
                <button class="w-full h-14 flex items-center justify-center gap-2.5 bg-gradient-to-r from-emerald-500 via-emerald-600 to-emerald-500 hover:from-emerald-600 hover:to-emerald-600 text-white font-black text-base rounded-xl shadow-2xl border-2 border-emerald-700">
                    <span>جلب البيانات من Google</span>
                </button>
            </div>

        </div>
    </div>
</body>
</html>
